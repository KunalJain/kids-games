<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario Adventure</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { display: flex; flex-direction: column; align-items: center; }
  #gameCanvas { border-radius: 12px; display: block; max-width: 100%; }
  #ui { display: flex; gap: 24px; font-size: 16px; font-weight: 600; padding: 0.5rem 0; }
  #msg { font-size: 14px; color: rgba(255,255,255,0.5); padding-bottom: 1rem; }
</style>
</head>
<body>

<div class="game-header">
  <a href="../index.html" class="back-btn">← Back</a>
  <h1>🍄 Mario Adventure</h1>
</div>

<div id="ui">
  <span>⭐ Stars: <span id="score">0</span></span>
  <span>❤️ Lives: <span id="lives">3</span></span>
  <span>🏆 Level: <span id="level">1</span></span>
</div>
<canvas id="gameCanvas" width="640" height="360"></canvas>
<div id="msg">Arrow keys or WASD to move — Space or Up to jump!</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GRAVITY = 0.5, JUMP = -13, SPEED = 4;
let score = 0, lives = 3, levelNum = 1, gameOver = false, won = false;

function makeLevel(n) {
  const platforms = [
    {x:0, y:320, w:200, h:40, c:'#5D8A3C'},
    {x:250, y:270, w:120, h:20, c:'#A0522D'},
    {x:420, y:230, w:100, h:20, c:'#A0522D'},
    {x:0, y:H, w:W, h:10, c:'transparent'},
  ];
  if (n >= 2) { platforms.push({x:100, y:200, w:80, h:20, c:'#A0522D'}); platforms.push({x:480, y:180, w:120, h:20, c:'#A0522D'}); }
  if (n >= 3) { platforms.push({x:200, y:150, w:80, h:20, c:'#A0522D'}); platforms.push({x:560, y:130, w:80, h:20, c:'#A0522D'}); }
  const coins = [];
  [[80,290],[160,290],[280,240],[340,240],[450,200],[510,200]].forEach(([x,y]) => coins.push({x,y,r:10,collected:false}));
  if (n >= 2) [[130,170],[510,150]].forEach(([x,y]) => coins.push({x,y,r:10,collected:false}));
  if (n >= 3) [[240,120],[590,100]].forEach(([x,y]) => coins.push({x,y,r:10,collected:false}));
  const enemies = [];
  [[180,300],[350,250],[470,210]].slice(0,n+1).forEach(([x,y]) => enemies.push({x,y:y-28,w:32,h:28,dx:1.2*n*0.5+0.8,alive:true}));
  return {platforms, coins, enemies, flag:{x:590,y:130,w:20,h:80}};
}

let lvl = makeLevel(levelNum);
const player = {x:30,y:260,w:32,h:40,vx:0,vy:0,onGround:false,facingRight:true};
const keys = {};
document.addEventListener('keydown', e => { keys[e.code]=true; if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
document.addEventListener('keyup', e => keys[e.code]=false);

function rectOverlap(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }
function resetPlayer(){ player.x=30;player.y=260;player.vx=0;player.vy=0; }
function nextLevel(){ levelNum++; if(levelNum>3){won=true;return;} lvl=makeLevel(levelNum); resetPlayer(); document.getElementById('level').textContent=levelNum; }

function drawBackground(){
  const sky=ctx.createLinearGradient(0,0,0,H); sky.addColorStop(0,'#87CEEB'); sky.addColorStop(1,'#C9E8F6');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';
  [[80,60,40],[200,40,30],[400,80,50],[550,50,35]].forEach(([cx,cy,r])=>{
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r,cy+5,r*0.7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-r+10,cy+5,r*0.6,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='#4A7C2F'; ctx.fillRect(0,330,W,30);
  ctx.fillStyle='#6DB33F'; ctx.fillRect(0,326,W,8);
}

function drawPlatforms(){
  lvl.platforms.forEach(p=>{
    if(p.c==='transparent')return;
    ctx.fillStyle=p.c; ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,6); ctx.fill();
    ctx.fillStyle=p.c==='#5D8A3C'?'#6DB33F':'#C0773D'; ctx.fillRect(p.x,p.y,p.w,6);
  });
}

function drawCoins(){
  lvl.coins.forEach(c=>{
    if(c.collected)return;
    const bob=Math.sin(Date.now()/500+c.x)*3;
    ctx.save(); ctx.translate(c.x,c.y+bob);
    const g=ctx.createRadialGradient(-3,-3,1,0,0,c.r); g.addColorStop(0,'#FFE566'); g.addColorStop(1,'#F5A623');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#D4890A'; ctx.lineWidth=1.5; ctx.stroke(); ctx.restore();
  });
}

function drawFlag(){
  const f=lvl.flag;
  ctx.fillStyle='#888'; ctx.fillRect(f.x+8,f.y,4,f.h);
  ctx.fillStyle='#E74C3C'; ctx.beginPath(); ctx.moveTo(f.x+12,f.y); ctx.lineTo(f.x+32,f.y+12); ctx.lineTo(f.x+12,f.y+24); ctx.fill();
}

function drawEnemies(){
  lvl.enemies.forEach(e=>{
    if(!e.alive)return;
    ctx.fillStyle='#8B4513'; ctx.beginPath(); ctx.ellipse(e.x+e.w/2,e.y+e.h*0.6,e.w/2,e.h*0.45,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#A0522D'; ctx.beginPath(); ctx.ellipse(e.x+e.w/2,e.y+e.h*0.35,e.w*0.45,e.h*0.38,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(e.x+e.w/2-6,e.y+e.h*0.28,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+e.w/2+6,e.y+e.h*0.28,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(e.x+e.w/2-5,e.y+e.h*0.28,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+e.w/2+7,e.y+e.h*0.28,3,0,Math.PI*2);ctx.fill();
  });
}

function drawPlayer(){
  const p=player; ctx.save(); ctx.translate(p.x+p.w/2,p.y+p.h/2);
  if(!p.facingRight)ctx.scale(-1,1);
  ctx.fillStyle='#E74C3C'; ctx.beginPath(); ctx.ellipse(0,-p.h*0.35,p.w*0.42,p.h*0.22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FDBCB4'; ctx.beginPath(); ctx.ellipse(0,-p.h*0.08,p.w*0.36,p.h*0.3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2C3E50'; ctx.fillRect(-p.w*0.3,p.h*0.15,p.w*0.6,p.h*0.35);
  ctx.fillStyle='#E67E22';
  ctx.fillRect(-p.w*0.3,p.h*0.45,p.w*0.27,p.h*0.1);
  ctx.fillRect(p.w*0.03,p.h*0.45,p.w*0.27,p.h*0.1);
  ctx.restore();
}

function update(){
  if(gameOver||won)return;
  if(keys['ArrowLeft']||keys['KeyA']){player.vx=-SPEED;player.facingRight=false;}
  else if(keys['ArrowRight']||keys['KeyD']){player.vx=SPEED;player.facingRight=true;}
  else player.vx=0;
  if((keys['Space']||keys['ArrowUp']||keys['KeyW'])&&player.onGround){player.vy=JUMP;player.onGround=false;}
  player.vy+=GRAVITY; player.x+=player.vx; player.y+=player.vy; player.onGround=false;
  const pr={x:player.x,y:player.y,w:player.w,h:player.h};
  lvl.platforms.forEach(p=>{
    if(p.c==='transparent')return;
    if(rectOverlap(pr,p)){
      const ox=Math.min(pr.x+pr.w,p.x+p.w)-Math.max(pr.x,p.x);
      const oy=Math.min(pr.y+pr.h,p.y+p.h)-Math.max(pr.y,p.y);
      if(oy<ox){
        if(player.y+player.h>p.y&&player.vy>=0){player.y=p.y-player.h;player.vy=0;player.onGround=true;}
        else if(player.y<p.y+p.h&&player.vy<0){player.y=p.y+p.h;player.vy=0;}
      } else {
        if(player.x<p.x)player.x=p.x-player.w; else player.x=p.x+p.w; player.vx=0;
      }
    }
  });
  if(player.y>H){lives--;document.getElementById('lives').textContent=lives;if(lives<=0){gameOver=true;return;}resetPlayer();}
  player.x=Math.max(0,Math.min(W-player.w,player.x));
  lvl.coins.forEach(c=>{
    if(!c.collected&&rectOverlap(pr,{x:c.x-c.r,y:c.y-c.r,w:c.r*2,h:c.r*2})){c.collected=true;score++;document.getElementById('score').textContent=score;}
  });
  lvl.enemies.forEach(e=>{
    if(!e.alive)return;
    e.x+=e.dx;
    let onPlat=false;
    lvl.platforms.forEach(p=>{if(p.c==='transparent')return;if(e.x>p.x&&e.x+e.w<p.x+p.w&&Math.abs((e.y+e.h)-p.y)<5)onPlat=true;});
    if(e.x<0||e.x+e.w>W||!onPlat)e.dx*=-1;
    if(rectOverlap(pr,{x:e.x,y:e.y,w:e.w,h:e.h})){
      if(player.vy>0&&player.y+player.h<e.y+e.h*0.5){e.alive=false;player.vy=-8;score+=2;document.getElementById('score').textContent=score;}
      else{lives--;document.getElementById('lives').textContent=lives;if(lives<=0){gameOver=true;return;}resetPlayer();}
    }
  });
  const f=lvl.flag;
  if(rectOverlap(pr,{x:f.x,y:f.y,w:f.w,h:f.h}))nextLevel();
}

function drawOverlay(text,sub){
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 40px sans-serif';ctx.textAlign='center';
  ctx.fillText(text,W/2,H/2-20);ctx.font='20px sans-serif';ctx.fillText(sub,W/2,H/2+20);
  ctx.fillStyle='#FFE566';ctx.font='16px sans-serif';ctx.fillText('Press Space or click to restart!',W/2,H/2+60);
}

function restart(){score=0;lives=3;levelNum=1;gameOver=false;won=false;lvl=makeLevel(1);resetPlayer();document.getElementById('score').textContent=0;document.getElementById('lives').textContent=3;document.getElementById('level').textContent=1;}

document.addEventListener('keydown',e=>{if(e.code==='Space'&&(gameOver||won))restart();});
canvas.addEventListener('click',()=>{if(gameOver||won)restart();});

function loop(){
  ctx.clearRect(0,0,W,H);
  drawBackground();drawPlatforms();drawFlag();drawCoins();drawEnemies();drawPlayer();
  if(gameOver)drawOverlay('Game Over!',`You got ${score} stars!`);
  if(won)drawOverlay('You Win! 🎉',`Amazing! You got ${score} stars!`);
  if(!gameOver&&!won)update();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
