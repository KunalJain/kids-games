<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Math Maze</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { display:flex; flex-direction:column; align-items:center; }
  #bCanvas { border-radius:14px; display:block; max-width:100%; cursor:pointer; }
  #ui { display:flex; gap:16px; font-size:15px; font-weight:600; padding:0.5rem 0; align-items:center; flex-wrap:wrap; justify-content:center; }
  #bNextBox { background:#FFD700; color:#6b4000; border-radius:20px; padding:3px 14px; font-weight:800; font-size:18px; }
  #popup { display:none; flex-direction:column; align-items:center; gap:10px; background:#fff; border-radius:18px; padding:20px 24px; width:320px; max-width:90vw; margin:10px 0; box-shadow:0 8px 32px rgba(0,0,0,0.25); }
  #question { font-size:30px; font-weight:800; color:#1a1a2e; text-align:center; }
  #choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
  .choice { background:#f0f4ff; border:2px solid #c5d0f5; border-radius:12px; padding:12px 0; font-size:24px; font-weight:800; cursor:pointer; text-align:center; color:#1a1a2e; transition:background .15s,transform .1s; }
  .choice:hover { background:#e0e8ff; transform:scale(1.04); }
  .choice.correct { background:#d4f5dd; border-color:#2ECC71; color:#145a2a; }
  .choice.wrong { background:#ffe0e0; border-color:#E74C3C; color:#7a1010; animation:shake .3s; }
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  #feedback { font-size:16px; font-weight:600; min-height:22px; color:#444; }
  #msg { font-size:14px; color:rgba(255,255,255,0.5); padding-bottom:0.5rem; }
  #lvlbadge { font-size:13px; color:rgba(255,255,255,0.35); padding-bottom:1rem; }
</style>
</head>
<body>

<div class="game-header">
  <a href="../index.html" class="back-btn">← Back</a>
  <h1>🧠 Beast Math Maze</h1>
</div>

<div id="ui">
  <span>⭐ Lvl <span id="blvl">1</span></span>
  <span>Jump to: <span id="bNextBox">2</span></span>
  <span>💯 Score: <span id="bscore">0</span></span>
  <span>❌ Errors: <span id="berrors">0</span></span>
</div>
<canvas id="bCanvas" width="520" height="420"></canvas>
<div id="popup">
  <div id="question"></div>
  <div id="choices"></div>
  <div id="feedback"></div>
</div>
<div id="msg">Tap the glowing number — then solve the math to jump!</div>
<div id="lvlbadge"></div>

<script>
const canvas=document.getElementById('bCanvas');
const ctx=canvas.getContext('2d');
const W=520,H=420;
const LEVELS=[{grid:4,count:5,label:'Addition'},{grid:5,count:8,label:'Mixed + −'},{grid:5,count:10,label:'Bigger Numbers'},{grid:6,count:12,label:'Multiply!'}];
const THEMES=[{bg:'#dbeeff',cell1:'#eaf4ff',cell2:'#c5dfff',trail:'#90C4F7'},{bg:'#d5f5e3',cell1:'#eafff2',cell2:'#b8ebd0',trail:'#82E0AA'},{bg:'#fdebd0',cell1:'#fff4e5',cell2:'#fadbb0',trail:'#F0A060'},{bg:'#edd5ff',cell1:'#f6eeff',cell2:'#ddb8ff',trail:'#C39BD3'}];
const NUM_COLORS=['#E74C3C','#E67E22','#F39C12','#27AE60','#2980B9','#8E44AD','#16A085','#C0392B','#D35400','#1A5276','#145A32','#6C3483'];
let lvlIdx=0,nextNum=1,score=0,errors=0,cells=[],playerCell=null,animPct=1,animFrom=null,animTarget=null,pendingCell=null,answered=false,state='playing',shakeCells={};

function makeProblem(level){
  let a,b,op,ans;
  if(level===0){a=Math.floor(Math.random()*9)+1;b=Math.floor(Math.random()*9)+1;op='+';ans=a+b;}
  else if(level===1){if(Math.random()<0.5){a=Math.floor(Math.random()*12)+4;b=Math.floor(Math.random()*(a-2))+1;op='−';ans=a-b;}else{a=Math.floor(Math.random()*10)+3;b=Math.floor(Math.random()*10)+3;op='+';ans=a+b;}}
  else if(level===2){if(Math.random()<0.5){a=Math.floor(Math.random()*30)+15;b=Math.floor(Math.random()*20)+5;op='+';ans=a+b;}else{a=Math.floor(Math.random()*30)+20;b=Math.floor(Math.random()*15)+3;op='−';ans=a-b;}}
  else{const type=Math.floor(Math.random()*3);if(type===0){a=Math.floor(Math.random()*9)+2;b=Math.floor(Math.random()*9)+2;op='×';ans=a*b;}else if(type===1){b=Math.floor(Math.random()*9)+2;ans=Math.floor(Math.random()*9)+2;a=ans*b;op='÷';}else{a=Math.floor(Math.random()*40)+10;b=Math.floor(Math.random()*30)+5;op='+';ans=a+b;}}
  const choices=[ans];
  while(choices.length<4){let w=ans+Math.floor(Math.random()*12)-6;if(w<=0)w=ans+Math.floor(Math.random()*5)+1;if(!choices.includes(w))choices.push(w);}
  for(let i=choices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[choices[i],choices[j]]=[choices[j],choices[i]];}
  return{question:`${a} ${op} ${b} = ?`,answer:ans,choices};
}

function makeLevel(li){
  const cfg=LEVELS[li],g=cfg.grid,cellSz=Math.min(W,H)/g;
  const allPos=[];
  for(let r=0;r<g;r++)for(let c=0;c<g;c++)allPos.push({r,c});
  for(let i=allPos.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[allPos[i],allPos[j]]=[allPos[j],allPos[i]];}
  cells=allPos.slice(0,cfg.count).map((pos,i)=>({r:pos.r,c:pos.c,num:i+1,x:pos.c*cellSz+cellSz/2,y:pos.r*cellSz+cellSz/2,sz:cellSz,visited:false,prob:makeProblem(li)}));
  playerCell=cells[0];playerCell.visited=true;nextNum=2;pendingCell=null;answered=false;animPct=1;animFrom=null;animTarget=null;shakeCells={};state='playing';
  document.getElementById('blvl').textContent=li+1;document.getElementById('bNextBox').textContent=nextNum;
  document.getElementById('bscore').textContent=score;document.getElementById('berrors').textContent=errors;
  document.getElementById('lvlbadge').textContent=`Level ${li+1}: ${cfg.label}`;
  hidePopup();
}

function getCellAt(x,y){const g=LEVELS[lvlIdx].grid,cellSz=Math.min(W,H)/g,c=Math.floor(x/cellSz),r=Math.floor(y/cellSz);return cells.find(cell=>cell.r===r&&cell.c===c)||null;}

function showPopup(cell){
  pendingCell=cell;answered=false;
  const pop=document.getElementById('popup');pop.style.display='flex';
  document.getElementById('question').textContent=cell.prob.question;document.getElementById('feedback').textContent='';
  const ch=document.getElementById('choices');ch.innerHTML='';
  cell.prob.choices.forEach(val=>{const btn=document.createElement('button');btn.className='choice';btn.textContent=val;btn.onclick=()=>checkAnswer(val,btn,cell);ch.appendChild(btn);});
}

function hidePopup(){document.getElementById('popup').style.display='none';pendingCell=null;}

function checkAnswer(val,btn,cell){
  if(answered)return;
  if(val===cell.prob.answer){
    answered=true;btn.classList.add('correct');document.getElementById('feedback').textContent='🎉 Correct! Jumping!';
    score+=20;document.getElementById('bscore').textContent=score;
    setTimeout(()=>{hidePopup();animFrom={x:playerCell.x,y:playerCell.y};animTarget=cell;animPct=0;cell.visited=true;
      if(cell.num===cells.length){setTimeout(()=>{state=lvlIdx>=LEVELS.length-1?'win':'levelup';},500);}
      else{nextNum++;document.getElementById('bNextBox').textContent=nextNum;}
    },700);
  } else {
    btn.classList.add('wrong');errors++;document.getElementById('berrors').textContent=errors;
    document.getElementById('feedback').textContent='❌ Try again!';setTimeout(()=>btn.classList.remove('wrong'),500);
  }
}

function lerp(a,b,t){return a+(b-a)*t;}function easeOut(t){return 1-Math.pow(1-t,3);}

function draw(){
  const li=lvlIdx,th=THEMES[li%THEMES.length],g=LEVELS[li].grid,cellSz=Math.min(W,H)/g;
  ctx.fillStyle=th.bg;ctx.fillRect(0,0,W,H);
  for(let r=0;r<g;r++)for(let c=0;c<g;c++){ctx.fillStyle=(r+c)%2===0?th.cell1:th.cell2;ctx.beginPath();ctx.roundRect(c*cellSz+2,r*cellSz+2,cellSz-4,cellSz-4,8);ctx.fill();}

  const visited=cells.filter(c=>c.visited);
  if(visited.length>1){ctx.strokeStyle=th.trail;ctx.lineWidth=Math.max(4,cellSz*0.18);ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=0.5;ctx.setLineDash([cellSz*0.18,cellSz*0.1]);ctx.beginPath();visited.forEach((c,i)=>i===0?ctx.moveTo(c.x,c.y):ctx.lineTo(c.x,c.y));ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;}

  const tick=Date.now()/600;
  cells.forEach(cell=>{
    const col=NUM_COLORS[(cell.num-1)%NUM_COLORS.length],r=cell.sz*0.35;
    let ox=0,oy=0;if(shakeCells[cell.num]>0){ox=(Math.random()-0.5)*7;oy=(Math.random()-0.5)*7;shakeCells[cell.num]--;}
    if(cell.visited){
      ctx.globalAlpha=0.35;ctx.fillStyle=col;ctx.beginPath();ctx.arc(cell.x+ox,cell.y+oy,r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      ctx.font=`bold ${cell.sz*0.35}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✓',cell.x+ox,cell.y+oy);
    } else {
      const pulse=cell.num===nextNum?Math.sin(tick)*4:0;
      ctx.shadowColor=col;ctx.shadowBlur=cell.num===nextNum?18:6;ctx.fillStyle=col;ctx.beginPath();ctx.arc(cell.x+ox,cell.y+oy,r+pulse,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,0.22)';ctx.beginPath();ctx.arc(cell.x+ox-r*0.25,cell.y+oy-r*0.3,r*0.35,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font=`bold ${cell.num>=10?cell.sz*0.24:cell.sz*0.3}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(cell.num,cell.x+ox,cell.y+oy-4);
      const qShort=cell.prob.question.replace('= ?','').trim();ctx.fillStyle='rgba(255,255,255,0.88)';ctx.font=`${cell.sz*0.16}px sans-serif`;ctx.fillText(qShort,cell.x+ox,cell.y+oy+r*0.55);
      if(cell.num===nextNum){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(cell.x,cell.y,r+pulse+7,0,Math.PI*2);ctx.stroke();}
    }
  });

  let px,py;
  if(animTarget&&animPct<1){const et=easeOut(animPct);px=lerp(animFrom.x,animTarget.x,et);py=lerp(animFrom.y,animTarget.y,et)-Math.sin(animPct*Math.PI)*Math.min(W,H)/LEVELS[lvlIdx].grid*0.9;}
  else{px=playerCell.x;py=playerCell.y;}
  ctx.font=`${Math.min(W,H)/LEVELS[lvlIdx].grid*0.5}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🐸',px,py);

  if(state==='levelup'||state==='win'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`bold ${W*0.1}px sans-serif`;ctx.fillStyle='#FFD700';ctx.fillText(state==='win'?'You Win! 🎉':'Level Up! ⭐',W/2,H/2-36);
    ctx.font=`${W*0.046}px sans-serif`;ctx.fillStyle='#fff';ctx.fillText(state==='win'?`Score: ${score} | Errors: ${errors}`:'Amazing math!',W/2,H/2+16);
    ctx.font=`${W*0.035}px sans-serif`;ctx.fillStyle='#FFD700';ctx.fillText('Tap to continue!',W/2,H/2+60);
  }
}

let lastTs=0;
function loop(ts){
  if(animTarget&&animPct<1){animPct=Math.min(1,animPct+(ts-lastTs)/380);if(animPct>=1){playerCell=animTarget;animTarget=null;}}
  lastTs=ts;draw();requestAnimationFrame(loop);
}

function handleTap(x,y){
  if(state==='levelup'){if(lvlIdx<LEVELS.length-1){lvlIdx++;makeLevel(lvlIdx);}return;}
  if(state==='win'){lvlIdx=0;score=0;errors=0;makeLevel(0);return;}
  if(animTarget||pendingCell)return;
  const clicked=getCellAt(x,y);
  if(!clicked)return;
  if(clicked.num===nextNum&&!clicked.visited)showPopup(clicked);
  else if(!clicked.visited&&clicked.num!==nextNum)shakeCells[clicked.num]=8;
}

canvas.addEventListener('click',e=>{const rect=canvas.getBoundingClientRect();handleTap((e.clientX-rect.left)*(W/rect.width),(e.clientY-rect.top)*(H/rect.height));});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const rect=canvas.getBoundingClientRect();handleTap((e.touches[0].clientX-rect.left)*(W/rect.width),(e.touches[0].clientY-rect.top)*(H/rect.height));},{passive:false});

makeLevel(0);requestAnimationFrame(loop);
</script>
</body>
</html>
